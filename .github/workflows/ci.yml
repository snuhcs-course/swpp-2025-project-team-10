name: Continuous Integration

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - dev

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'

jobs:
  # ============================================================================
  # Code Quality Checks
  # ============================================================================

  code-quality-python:
    name: Python Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 bandit ruff

      - name: Run Black (formatting check)
        working-directory: backend
        run: |
          black --check --diff . || {
            echo "::warning::Black formatting issues found. Run 'black .' to fix."
            exit 0
          }

      - name: Run isort (import sorting check)
        working-directory: backend
        run: |
          isort --check-only --diff . || {
            echo "::warning::Import sorting issues found. Run 'isort .' to fix."
            exit 0
          }

      - name: Run flake8 (linting)
        working-directory: backend
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=79 --statistics

      - name: Run bandit (security linting)
        working-directory: backend
        run: |
          bandit -r . \
            --exclude './*/migrations/*,./*/tests/*,./tests/*,./.venv/*,./htmlcov/*' \
            -ll \
            -f json \
            -o bandit-report.json || true
          echo "Bandit security scan completed. Check bandit-report.json for details."

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  code-quality-kotlin:
    name: Kotlin Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run ktlint
        run: |
          if [ -f tools/linting/ktlint ]; then
            chmod +x tools/linting/ktlint
            ./tools/linting/ktlint "frontend/**/*.kt" || true
          fi

      - name: Run detekt
        run: |
          if [ -f tools/linting/detekt-cli-1.23.1.jar ]; then
            java -jar tools/linting/detekt-cli-1.23.1.jar --input frontend/src --report xml:detekt-report.xml || true
          fi

      - name: Upload detekt report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-report
          path: detekt-report.xml

  # ============================================================================
  # Backend Tests
  # ============================================================================

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync --all-extras

      - name: Create required directories
        working-directory: backend
        run: |
          mkdir -p logs
          mkdir -p media
          mkdir -p staticfiles

      - name: Run Django migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: core.settings
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
        run: |
          uv run python manage.py migrate --noinput

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: core.settings
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
        run: |
          uv run pytest --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Check coverage threshold
        working-directory: backend
        run: |
          uv run coverage report --fail-under=80 || {
            echo "::warning::Coverage is below 80% threshold"
            echo "This is a warning for now, but should be addressed"
            exit 0
          }

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/htmlcov/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          name: backend-coverage

  # ============================================================================
  # Frontend Tests
  # ============================================================================

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        continue-on-error: true

      - name: Grant execute permission for gradlew
        working-directory: frontend
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          fi

      - name: Run frontend tests
        working-directory: frontend
        run: |
          if [ -f gradlew ]; then
            echo "Running Gradle tests..."
            ./gradlew test --stacktrace || {
              echo "::warning::Frontend tests failed or not configured yet"
              exit 0
            }
          else
            echo "::warning::gradlew not found. Skipping frontend tests."
            exit 0
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: frontend/build/test-results/

  # ============================================================================
  # Build
  # ============================================================================

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [code-quality-python, test-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          if [ -f backend/Dockerfile ]; then
            docker build -t swpp-backend:${{ github.sha }} backend/
          else
            echo "Dockerfile not found, skipping Docker build"
          fi

      - name: Save Docker image
        run: |
          if docker images | grep swpp-backend; then
            docker save swpp-backend:${{ github.sha }} | gzip > backend-image.tar.gz
          fi

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: backend-docker-image
          path: backend-image.tar.gz
          retention-days: 7

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [code-quality-kotlin, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: frontend
        run: |
          echo "APK build will be added when build.gradle is configured"
          # ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: frontend/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ============================================================================
  # Security Scanning
  # ============================================================================

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # Summary
  # ============================================================================

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [code-quality-python, code-quality-kotlin, test-backend, test-frontend, build-backend, build-frontend, security-scan]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "CI Pipeline Summary:"
          echo "===================="
          echo "Code Quality Python: ${{ needs.code-quality-python.result }}"
          echo "Code Quality Kotlin: ${{ needs.code-quality-kotlin.result }}"
          echo "Backend Tests: ${{ needs.test-backend.result }}"
          echo "Frontend Tests: ${{ needs.test-frontend.result }}"
          echo "Backend Build: ${{ needs.build-backend.result }}"
          echo "Frontend Build: ${{ needs.build-frontend.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"

          if [[ "${{ needs.code-quality-python.result }}" == "failure" ]] || \
             [[ "${{ needs.test-backend.result }}" == "failure" ]] || \
             [[ "${{ needs.build-backend.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          else
            echo "✅ CI Pipeline Passed"
          fi


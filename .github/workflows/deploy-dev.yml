name: Deploy Backend (dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_DIR: /home/ubuntu/swpp-2025-project-team-10
  BACKEND_DIR: /home/ubuntu/swpp-2025-project-team-10/backend

jobs:
  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Trigger SSM deploy
        env:
          SSM_INSTANCE_ID: ${{ secrets.SSM_INSTANCE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${SSM_INSTANCE_ID:-}" ]; then
            echo "SSM_INSTANCE_ID secret is required."
            exit 1
          fi

          DEPLOY_SCRIPT=$(cat <<'EOSCRIPT'
          set -euo pipefail
          sudo -u ubuntu bash -lc "
          set -euo pipefail
          cd /home/ubuntu/swpp-2025-project-team-10
          git fetch origin dev
          git reset --hard origin/dev

          cd /home/ubuntu/swpp-2025-project-team-10/backend
          python3.11 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install uv
          uv sync --extra dev
          mkdir -p logs media staticfiles
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
          sudo systemctl restart bookbarter
          "
          EOSCRIPT
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$SSM_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy dev branch" \
            --parameters commands="$DEPLOY_SCRIPT" \
            --query "Command.CommandId" \
            --output text)

          echo "Sent command: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$SSM_INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$SSM_INSTANCE_ID" \
            --query "[Status,StandardOutputContent,StandardErrorContent]" \
            --output text
